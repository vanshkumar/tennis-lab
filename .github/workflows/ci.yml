name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install frozen dependencies
        run: uv sync --frozen

      - name: Run unit, fixture-pipeline, and repository-hygiene tests
        run: uv run --frozen pytest

      - name: Rebuild deterministic publication smoke artifacts
        run: uv run --frozen tennislab publish-figure

      - name: Verify smoke artifacts and whitespace
        run: |
          git diff --exit-code -- artifacts/publication
          git diff --check
